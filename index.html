<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>R.I.P. Ben's Books</title>
  <style>
    @font-face {
      font-family: 'Windsor';
      src: url('Windsor Light Regular.otf') format('opentype');
    }
  </style>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }

    #photo {
      position: fixed;
      inset: 0;
      background: url('IMG_3921.JPG') center center / 85% auto no-repeat;
      filter: grayscale(40%) brightness(0.55);
    }

    #candles-wrap {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      user-select: none;
    }

    #center {
      position: fixed;
      left: 18%;
      bottom: 12%;
      user-select: none;
    }

    /* ── Candle row ── */
    .candles {
      display: flex;
      gap: clamp(16px, 3vw, 48px);
      align-items: flex-end;
      margin-bottom: 8px;
    }

    .candle {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Flame */
    .flame {
      position: relative;
      width: 14px;
      height: 22px;
    }

    .flame-inner {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 18px;
      background: radial-gradient(ellipse at 50% 80%, #fff 0%, #ffe566 30%, #ff9500 70%, transparent 100%);
      border-radius: 50% 50% 30% 30% / 60% 60% 40% 40%;
      filter: blur(0.5px);
      transform-origin: bottom center;
      animation: flame-flicker var(--dur, 1.8s) ease-in-out infinite alternate;
    }

    .flame-outer {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 14px;
      height: 22px;
      background: radial-gradient(ellipse at 50% 80%, rgba(255,180,0,0.6) 0%, rgba(255,80,0,0.3) 60%, transparent 100%);
      border-radius: 50% 50% 30% 30% / 60% 60% 40% 40%;
      filter: blur(2px);
      transform-origin: bottom center;
      animation: flame-flicker var(--dur, 1.8s) ease-in-out infinite alternate;
    }

    @keyframes flame-flicker {
      0%   { transform: translateX(-50%) scaleX(1)    scaleY(1)    rotate(-1deg); opacity: 1; }
      20%  { transform: translateX(-50%) scaleX(0.88) scaleY(1.06) rotate(1deg);  opacity: 0.95; }
      40%  { transform: translateX(-50%) scaleX(1.05) scaleY(0.94) rotate(-2deg); opacity: 1; }
      60%  { transform: translateX(-50%) scaleX(0.92) scaleY(1.08) rotate(1.5deg);opacity: 0.92; }
      80%  { transform: translateX(-50%) scaleX(1.03) scaleY(0.97) rotate(-1deg); opacity: 1; }
      100% { transform: translateX(-50%) scaleX(0.95) scaleY(1.04) rotate(2deg);  opacity: 0.96; }
    }

    /* Wick */
    .wick {
      width: 2px;
      height: 6px;
      background: #555;
      border-radius: 1px;
    }

    /* Wax body */
    .wax {
      width: clamp(12px, 2vw, 20px);
      height: clamp(40px, 7vh, 70px);
      background: linear-gradient(to right, #e8dcc8, #f5ede0, #d4c9b4);
      border-radius: 2px 2px 1px 1px;
      box-shadow: 0 0 8px rgba(255,180,60,0.3);
    }

    /* ── Text ── */
    .text-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: text-flicker 4s infinite;
    }

    .rip {
      font-family: 'Windsor', 'Georgia', serif;
      font-size: clamp(1.5rem, 4.5vw, 4rem);
      letter-spacing: 0.15em;
      color: #f5e6c8;
      text-shadow:
        0 0 20px rgba(255,200,80,0.9),
        0 0 60px rgba(255,140,20,0.5),
        0 0 120px rgba(255,80,0,0.25);
    }

    .name {
      font-family: 'Windsor', 'Georgia', serif;
      font-size: clamp(0.7rem, 2vw, 1.6rem);
      letter-spacing: 0.1em;
      color: #f5e6c8;
      text-shadow:
        0 0 12px rgba(255,200,80,0.7),
        0 0 40px rgba(255,140,20,0.35);
    }

    .years {
      font-family: 'Windsor', 'Georgia', serif;
      font-size: clamp(0.45rem, 1.1vw, 0.9rem);
      letter-spacing: 0.12em;
      color: rgba(245,230,200,0.75);
      text-shadow:
        0 0 10px rgba(255,200,80,0.5),
        0 0 30px rgba(255,140,20,0.25);
    }

    @keyframes text-flicker {
      0%   { opacity: 1; }
      4%   { opacity: 0.92; }
      8%   { opacity: 1; }
      15%  { opacity: 0.96; }
      19%  { opacity: 1; }
      42%  { opacity: 0.85; }
      44%  { opacity: 1; }
      73%  { opacity: 0.88; }
      75%  { opacity: 1; }
      100% { opacity: 1; }
    }
    #snow {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 3;
    }

    /* ── Guestbook button ── */
    #gb-tab {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Windsor', Georgia, serif;
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(245,230,200,0.75);
      background: transparent;
      border: 1px solid rgba(245,230,200,0.25);
      padding: 12px 28px;
      cursor: pointer;
      user-select: none;
      transition: color 0.3s, border-color 0.3s, text-shadow 0.3s;
      text-shadow: 0 0 18px rgba(255,200,80,0.4);
    }

    #gb-tab:hover {
      color: rgba(245,230,200,1);
      border-color: rgba(245,230,200,0.55);
      text-shadow: 0 0 28px rgba(255,200,80,0.8), 0 0 60px rgba(255,140,20,0.4);
    }

    /* ── Guestbook panel ── */
    #gb-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 380px;
      height: 100%;
      background: rgba(8,6,4,0.94);
      border-left: 1px solid rgba(255,255,255,0.1);
      z-index: 20;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      backdrop-filter: blur(6px);
    }

    #gb-panel.open { transform: translateX(0); }

    #gb-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    #gb-header h2 {
      font-family: 'Windsor', Georgia, serif;
      font-size: 0.75rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(245,230,200,0.7);
      font-weight: normal;
    }

    #gb-close {
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 1.3rem;
      cursor: pointer;
      line-height: 1;
      padding: 0;
    }

    #gb-close:hover { color: rgba(255,255,255,0.8); }

    /* ── Guestbook form ── */
    /* ── Guestbook body (messages + form) ── */
    #gb-body {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    #gb-body::-webkit-scrollbar { width: 4px; }
    #gb-body::-webkit-scrollbar-track { background: transparent; }
    #gb-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

    /* ── Past messages ── */
    #gb-messages {
      padding: 16px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .gb-msg {
      border-left: 1px solid rgba(245,230,200,0.18);
      padding-left: 12px;
    }

    .gb-msg-name {
      font-family: 'Windsor', Georgia, serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(245,230,200,0.65);
      margin-bottom: 4px;
    }

    .gb-msg-text {
      font-family: Georgia, serif;
      font-size: 0.83rem;
      line-height: 1.55;
      color: rgba(255,255,255,0.75);
      white-space: pre-wrap;
    }

    #gb-divider {
      margin: 18px 20px 0;
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    #gb-form {
      padding: 16px 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
    }

    #gb-form input,
    #gb-form textarea {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.85);
      font-family: Georgia, serif;
      font-size: 0.85rem;
      padding: 10px 13px;
      width: 100%;
      outline: none;
      resize: none;
      border-radius: 2px;
    }

    #gb-form input::placeholder,
    #gb-form textarea::placeholder { color: rgba(255,255,255,0.25); }

    #gb-form input:focus,
    #gb-form textarea:focus { border-color: rgba(245,230,200,0.3); }

    #gb-form textarea { height: 120px; }

    #gb-submit {
      background: rgba(245,230,200,0.08);
      border: 1px solid rgba(245,230,200,0.22);
      color: rgba(245,230,200,0.75);
      font-family: 'Windsor', Georgia, serif;
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 11px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    #gb-submit:hover {
      background: rgba(245,230,200,0.14);
      color: rgba(245,230,200,1);
    }

    #gb-submit:disabled { opacity: 0.4; cursor: default; }

    #gb-status {
      font-size: 0.72rem;
      text-align: center;
      color: rgba(245,230,200,0.5);
      min-height: 1em;
      font-family: Georgia, serif;
    }
  </style>
</head>
<body>
  <div id="photo"></div>
  <canvas id="snow"></canvas>

  <!-- Guestbook tab -->
  <div id="gb-tab" onclick="openGuestbook()">Guestbook</div>

  <!-- Guestbook panel -->
  <div id="gb-panel">
    <div id="gb-header">
      <h2>Guestbook</h2>
      <button id="gb-close" onclick="closeGuestbook()">×</button>
    </div>
    <div id="gb-body">
      <div id="gb-messages"></div>
      <hr id="gb-divider">
      <div id="gb-form">
        <input id="gb-name" type="text" placeholder="Your name" maxlength="80" autocomplete="off">
        <textarea id="gb-message" placeholder="Leave a message for Ben's Books…" maxlength="1000"></textarea>
        <button id="gb-submit" onclick="submitMessage()">Leave a message</button>
        <div id="gb-status"></div>
      </div>
    </div>
  </div>

  <div id="center">
    <div class="text-block">
      <div class="rip">R.I.P.</div>
      <div class="name">Ben's Books</div>
      <div class="years">(2013 – 2020)</div>
    </div>

  </div>
  <script>
    const canvas = document.getElementById('snow');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const FLAKES = 140;
    const flakes = Array.from({ length: FLAKES }, () => ({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 2.5 + 0.8,
      speed: Math.random() * 0.8 + 0.3,
      drift: Math.random() * 0.5 - 0.25,
      opacity: Math.random() * 0.55 + 0.2,
      wobble: Math.random() * Math.PI * 2,
      wobbleSpeed: Math.random() * 0.01 + 0.003,
    }));

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      flakes.forEach(f => {
        f.wobble += f.wobbleSpeed;
        f.x += f.drift + Math.sin(f.wobble) * 0.3;
        f.y += f.speed;
        if (f.y > canvas.height) {
          f.y = -4;
          f.x = Math.random() * canvas.width;
        }
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${f.opacity})`;
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    draw();
  </script>

  <script>
    const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSfTsv1pSUkIyyKWFDmCiOg_So2IVC8MyumGZxdqOpvNvI7YpA/formResponse';
    const CSV_URL  = 'https://docs.google.com/spreadsheets/d/1-C2VKojAmCIaGxl-KcNHqGi2Fudt3xTqRsJZtVeT_G4/export?format=csv&gid=59466693';

    function parseCSV(text) {
      const rows = [];
      let i = 0;
      while (i < text.length) {
        const row = [];
        while (i < text.length && text[i] !== '\n') {
          if (text[i] === '"') {
            i++;
            let cell = '';
            while (i < text.length) {
              if (text[i] === '"' && text[i+1] === '"') { cell += '"'; i += 2; }
              else if (text[i] === '"') { i++; break; }
              else { cell += text[i++]; }
            }
            row.push(cell);
          } else {
            let cell = '';
            while (i < text.length && text[i] !== ',' && text[i] !== '\n') { cell += text[i++]; }
            row.push(cell);
          }
          if (text[i] === ',') i++;
        }
        if (text[i] === '\n') i++;
        if (row.length > 0 && row.join('').trim()) rows.push(row);
      }
      return rows;
    }

    async function loadMessages() {
      const container = document.getElementById('gb-messages');
      try {
        const res = await fetch(CSV_URL + '&cachebust=' + Date.now());
        const text = await res.text();
        const rows = parseCSV(text).slice(1).reverse(); // skip header, newest first
        container.innerHTML = '';
        rows.forEach(row => {
          const name = (row[1] || '').trim();
          const msg  = (row[2] || '').trim();
          if (!name && !msg) return;
          const el = document.createElement('div');
          el.className = 'gb-msg';
          el.innerHTML = `<div class="gb-msg-name">${escapeHtml(name)}</div><div class="gb-msg-text">${escapeHtml(msg)}</div>`;
          container.appendChild(el);
        });
        if (!rows.length) container.innerHTML = '<div style="font-family:Georgia,serif;font-size:0.78rem;color:rgba(255,255,255,0.3);padding-left:12px;">No messages yet. Be the first.</div>';
      } catch {
        container.innerHTML = '';
      }
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function openGuestbook() {
      document.getElementById('gb-panel').classList.add('open');
      document.getElementById('gb-tab').style.display = 'none';
      loadMessages();
    }

    function closeGuestbook() {
      document.getElementById('gb-panel').classList.remove('open');
      document.getElementById('gb-tab').style.display = '';
    }

    async function submitMessage() {
      const name = document.getElementById('gb-name').value.trim();
      const message = document.getElementById('gb-message').value.trim();
      const status = document.getElementById('gb-status');
      const btn = document.getElementById('gb-submit');

      if (!name || !message) { status.textContent = 'Please fill in both fields.'; return; }

      btn.disabled = true;
      status.textContent = 'Sending…';

      try {
        await fetch(FORM_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: `entry.1706813826=${encodeURIComponent(name)}&entry.1844150392=${encodeURIComponent(message)}`
        });
        document.getElementById('gb-name').value = '';
        document.getElementById('gb-message').value = '';
        status.textContent = 'Thank you. Your message was received.';
        setTimeout(loadMessages, 3000);
      } catch {
        status.textContent = 'Something went wrong. Please try again.';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
